<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BurgerControl PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
.page { display:none }
.page.active { display:block }
</style>
</head>

<body class="bg-zinc-950 text-white">

<!-- HEADER -->
<div class="bg-gradient-to-r from-red-600 to-orange-500 p-5 rounded-b-3xl">
  <h1 class="text-xl font-bold">BurgerControl PRO</h1>
</div>

<!-- HOME -->
<div id="home" class="page active p-4">
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-zinc-900 p-3 rounded-xl">
      <p>Faturamento</p>
      <h2 id="fat">R$0</h2>
    </div>
    <div class="bg-zinc-900 p-3 rounded-xl">
      <p>Lucro</p>
      <h2 id="lucro">R$0</h2>
    </div>
    <div class="bg-zinc-900 p-3 rounded-xl">
      <p>Registros</p>
      <h2 id="pedidos">0</h2>
    </div>
    <div class="bg-zinc-900 p-3 rounded-xl">
      <p>Média</p>
      <h2 id="ticket">R$0</h2>
    </div>
  </div>
</div>

<!-- FINANCEIRO -->
<div id="financeiroPage" class="page p-4">
  <h2 class="mb-2 font-bold">Faturamento</h2>

  <div class="flex gap-2">
    <input id="valorDia" placeholder="Valor (opcional)" class="flex-1 p-2 bg-zinc-800 rounded">
    <button onclick="addFaturamento()" class="bg-green-500 px-4 rounded">Adicionar</button>
  </div>

  <div id="listaFinanceiro" class="mt-4"></div>

  <canvas id="grafico" class="mt-6"></canvas>
</div>

<!-- ESTOQUE -->
<div id="estoquePage" class="page p-4">
  <h2 class="mb-2 font-bold">Estoque</h2>

  <div class="flex gap-2">
    <input id="nomeItem" placeholder="Item" class="flex-1 p-2 bg-zinc-800 rounded">
    <input id="qtdItem" placeholder="Qtd" class="w-20 p-2 bg-zinc-800 rounded">
    <button onclick="addItem()" class="bg-orange-500 px-4 rounded">Adicionar</button>
  </div>

  <div id="listaEstoque" class="mt-4"></div>
</div>

<!-- RELATÓRIO -->
<div id="relatorioPage" class="page p-4">
  <h2 class="font-bold mb-3">Relatórios</h2>

  <div class="flex gap-2 mb-3">
    <button onclick="relatorioDias(7)" class="bg-zinc-800 px-3 py-2 rounded">7 dias</button>
    <button onclick="relatorioDias(15)" class="bg-zinc-800 px-3 py-2 rounded">15 dias</button>
    <button onclick="relatorioDias(30)" class="bg-zinc-800 px-3 py-2 rounded">30 dias</button>
  </div>

  <div class="mb-3">
    <input type="date" id="dataFiltro" class="p-2 bg-zinc-800 rounded w-full">
    <button onclick="relatorioDia()" class="mt-2 w-full bg-blue-500 p-2 rounded">
      Filtrar por dia
    </button>
  </div>

  <div class="bg-zinc-900 p-3 rounded mb-3">
    <h3 class="font-bold">Financeiro</h3>
    <div id="relFinanceiro"></div>
  </div>

  <div class="bg-zinc-900 p-3 rounded">
    <h3 class="font-bold">Estoque</h3>
    <div id="relEstoque"></div>
  </div>
</div>

<!-- MENU -->
<div class="fixed bottom-0 w-full bg-zinc-900 flex justify-around py-3 text-sm font-semibold">
  <button onclick="nav('home')">INÍCIO</button>
  <button onclick="nav('financeiroPage')">FINANCEIRO</button>
  <button onclick="nav('estoquePage')">ESTOQUE</button>
  <button onclick="nav('relatorioPage')">RELATÓRIO</button>
</div>

<script>
let financeiro = JSON.parse(localStorage.getItem('financeiro')) || []
let estoque = JSON.parse(localStorage.getItem('estoque')) || []
let chart

function save(){
  localStorage.setItem('financeiro', JSON.stringify(financeiro))
  localStorage.setItem('estoque', JSON.stringify(estoque))
}

function nav(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
  document.getElementById(p).classList.add('active')
}

function addFaturamento(){
  let valor = parseFloat(valorDia.value) || 0
  financeiro.push({
    valor,
    data: new Date().toISOString()
  })
  valorDia.value = ''
  save()
  renderFinanceiro()
  atualizar()
  grafico()
}

function removerFinanceiro(i){
  financeiro.splice(i,1)
  save()
  renderFinanceiro()
  atualizar()
  grafico()
}

function renderFinanceiro(){
  listaFinanceiro.innerHTML = ''
  financeiro.forEach((f,i)=>{
    listaFinanceiro.innerHTML += `
    <div class="flex justify-between bg-zinc-900 p-2 rounded mb-2">
      <span>R$${f.valor}</span>
      <button onclick="removerFinanceiro(${i})" class="text-red-400">Remover</button>
    </div>`
  })
}

function addItem(){
  let nome = nomeItem.value.toLowerCase().trim()
  let qtd = parseInt(qtdItem.value)

  if(!nome || !qtd) return

  let existe = estoque.find(e=>e.nome === nome)

  if(existe){
    existe.qtd += qtd
  } else {
    estoque.push({nome,qtd})
  }

  nomeItem.value=''
  qtdItem.value=''

  save()
  renderEstoque()
}

function removerEstoque(i){
  estoque.splice(i,1)
  save()
  renderEstoque()
}

function renderEstoque(){
  listaEstoque.innerHTML=''
  estoque.forEach((e,i)=>{
    listaEstoque.innerHTML += `
    <div class="flex justify-between bg-zinc-900 p-2 rounded mb-2">
      <span>${e.nome} (${e.qtd})</span>
      <button onclick="removerEstoque(${i})" class="text-red-400">Remover</button>
    </div>`
  })
}

function atualizar(){
  let total = financeiro.reduce((a,b)=>a+b.valor,0)

  fat.innerText = 'R$'+total.toFixed(2)
  lucro.innerText = 'R$'+(total*0.6).toFixed(2)
  pedidos.innerText = financeiro.length
  ticket.innerText = 'R$'+(financeiro.length?total/financeiro.length:0).toFixed(2)
}

function relatorioDias(dias){
  let now = new Date()

  let filtrado = financeiro.filter(f=>{
    return (now - new Date(f.data))/(1000*60*60*24) <= dias
  })

  let total = filtrado.reduce((a,b)=>a+b.valor,0)

  relFinanceiro.innerHTML = `Total: R$${total.toFixed(2)}`

  relEstoque.innerHTML = estoque.map(e=>`${e.nome}: ${e.qtd}`).join('<br>')
}

function relatorioDia(){
  let data = dataFiltro.value
  if(!data) return

  let filtrado = financeiro.filter(f=>{
    return new Date(f.data).toISOString().slice(0,10) === data
  })

  let total = filtrado.reduce((a,b)=>a+b.valor,0)

  relFinanceiro.innerHTML = `Dia: R$${total.toFixed(2)}`
}

function grafico(){
  let labels = financeiro.map(f=> new Date(f.data).toLocaleDateString())
  let data = financeiro.map(f=> f.valor)

  if(chart) chart.destroy()

  chart = new Chart(document.getElementById('grafico'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        data:data
      }]
    }
  })
}

renderFinanceiro()
renderEstoque()
atualizar()
grafico()
</script>

</body>
</html>
